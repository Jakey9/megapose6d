name: megapose
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - pip

  # =========================
  # Core PyTorch stack (STABLE)
  # =========================
  - pytorch=2.1.2
  - torchvision=0.16.2
  - pytorch-cuda=11.8

  # =========================
  # Scientific stack (pinned for stability)
  # =========================
  - numpy=1.26.*
  - scipy
  - pillow
  - h5py
  - pyyaml
  - tqdm
  - joblib
  - ipython
  - ipykernel
  - notebook=6.5.6

  # =========================
  # Robotics / geometry deps
  # =========================
  - pinocchio
  - rclone

  # =========================
  # Critical runtime stability libs (IMPORTANT FIX)
  # =========================
  # - mkl
  # - mkl-service
  # - intel-openmp

  # =========================
  # pip-only packages
  # =========================
  - pip:
      # vision / geometry
      - opencv-python
      - transforms3d
      - roma
      - trimesh
      - meshcat
      - dt-apriltags
      - kornia

      # dataset / IO
      - webdataset
      - omegaconf
      - simplejson
      - psutil
      - structlog
      - imageio
      - progressbar
      - colorama
      - pyarrow
      # - bokeh
      - pypng
      # - seaborn

      # visualization
      - matplotlib

      # IMPORTANT: removed torchgeometry (obsolete + breaks torch ABI)

      # optional heavy libs
      - open3d
      - panda3d